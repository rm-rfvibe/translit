<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Транслитерация</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 1rem;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
      padding: 2.5rem;
      width: 100%;
      max-width: 700px;
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: .4rem;
      font-size: 1.75rem;
    }

    .subtitle {
      text-align: center;
      color: #888;
      margin-bottom: 2rem;
      font-size: .95rem;
    }

    .fields {
      display: grid;
      grid-template-columns: 1fr 50px 1fr;
      align-items: start;
      gap: .5rem;
    }

    .arrow {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: #764ba2;
      padding-top: 2.2rem;
    }

    label {
      font-weight: 600;
      color: #555;
      display: block;
      margin-bottom: .5rem;
      font-size: .9rem;
    }

    textarea {
      width: 100%;
      min-height: 140px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      padding: .85rem 1rem;
      font-size: 1.05rem;
      font-family: inherit;
      resize: vertical;
      transition: border-color .2s;
      outline: none;
    }

    textarea:focus { border-color: #764ba2; }

    .history-section {
      margin-top: 2rem;
      border-top: 1px solid #eee;
      padding-top: 1.5rem;
    }

    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .history-header h2 {
      font-size: 1.1rem;
      color: #555;
    }

    .history-header button {
      background: #764ba2;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: .5rem 1rem;
      font-size: .85rem;
      cursor: pointer;
      transition: background .2s;
    }

    .history-header button:hover { background: #5e3a82; }

    .history-list {
      list-style: none;
      max-height: 200px;
      overflow-y: auto;
    }

    .history-list li {
      padding: .45rem .7rem;
      border-radius: 6px;
      font-size: .95rem;
      color: #444;
    }

    .history-list li:nth-child(odd) { background: #f7f5fa; }

    .empty { color: #aaa; font-style: italic; font-size: .9rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Транслитерация</h1>
    <p class="subtitle">Введите русский текст — получите латиницу</p>

    <div class="fields">
      <div>
        <label for="source">Кириллица</label>
        <textarea id="source" placeholder="вода"></textarea>
      </div>
      <div class="arrow">→</div>
      <div>
        <label for="result">Латиница</label>
        <textarea id="result" readonly placeholder="voda"></textarea>
      </div>
    </div>

    <div class="history-section">
      <div class="history-header">
        <h2>История запросов</h2>
        <button id="load-history">Обновить</button>
      </div>
      <ul class="history-list" id="history-list">
        <li class="empty">Пока пусто</li>
      </ul>
    </div>
  </div>

  <script>
    const source = document.getElementById('source');
    const result = document.getElementById('result');
    const historyList = document.getElementById('history-list');
    const loadBtn = document.getElementById('load-history');

    let debounceTimer;

    source.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      const text = source.value;
      if (!text.trim()) {
        result.value = '';
        return;
      }
      debounceTimer = setTimeout(() => {
        fetch('/api', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ data: text }),
        })
          .then(r => r.json())
          .then(json => {
            if (json.status === 'success') result.value = json.data;
          })
          .catch(() => {});
      }, 300);
    });

    async function loadHistory() {
      const res = await fetch('/history?n=10');
      const json = await res.json();
      if (!json.data || json.data.length === 0) {
        historyList.innerHTML = '<li class="empty">Пока пусто</li>';
        return;
      }
      historyList.innerHTML = json.data
        .map(item => `<li>${escapeHtml(item)}</li>`)
        .join('');
    }

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    loadBtn.addEventListener('click', loadHistory);
    loadHistory();
  </script>
</body>
</html>
